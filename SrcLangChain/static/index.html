<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>众星云集-星河绘梦</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 56px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: 8px;
        }

        .header p {
            color: #888;
            font-size: 16px;
        }

        .input-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .input-group input {
            flex: 1;
            padding: 15px 20px;
            border: none;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }

        .input-group input:focus {
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .input-group input::placeholder {
            color: #666;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* 进度流程 */
        .pipeline {
            display: flex;
            justify-content: space-between;
            margin: 30px 0;
            position: relative;
        }

        .pipeline::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 10%;
            right: 10%;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            z-index: 0;
        }

        .pipeline-progress {
            position: absolute;
            top: 20px;
            left: 10%;
            height: 2px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            transition: width 0.5s ease;
            z-index: 1;
        }

        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 2;
            flex: 1;
        }

        .step-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.5s;
            border: 2px solid transparent;
        }

        .step.pending .step-icon {
            background: rgba(255, 255, 255, 0.05);
            color: #666;
        }

        .step.running .step-icon {
            background: rgba(0, 212, 255, 0.2);
            border-color: #00d4ff;
            color: #00d4ff;
            animation: pulse 1.5s infinite;
        }

        .step.completed .step-icon {
            background: rgba(0, 212, 255, 0.3);
            border-color: #00d4ff;
            color: #00d4ff;
        }

        .step.error .step-icon {
            background: rgba(255, 0, 0, 0.2);
            border-color: #ff4444;
            color: #ff4444;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 212, 255, 0.4); }
            50% { transform: scale(1.1); box-shadow: 0 0 20px 5px rgba(0, 212, 255, 0.2); }
        }

        .step-name {
            margin-top: 8px;
            font-size: 12px;
            color: #888;
            transition: color 0.3s;
            text-align: center;
        }

        .step.running .step-name {
            color: #00d4ff;
        }

        .step.completed .step-name {
            color: #00d4ff;
        }

        /* 日志输出 */
        .logs {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }

        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .log-time {
            color: #666;
            margin-right: 10px;
        }

        .log-info { color: #00d4ff; }
        .log-success { color: #00ff88; }
        .log-error { color: #ff4444; }
        .log-warn { color: #ffaa00; }

        /* 提示词展示 */
        .prompt-display {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #aaa;
            line-height: 1.6;
            display: none;
        }

        .prompt-display h4 {
            color: #00d4ff;
            margin-bottom: 10px;
        }

        .prompt-meta {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        .meta-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 8px;
        }

        .meta-item label {
            color: #666;
            font-size: 11px;
        }

        .meta-item value {
            color: #fff;
            font-size: 13px;
        }

        /* 结果展示 */
        .result {
            margin-top: 30px;
            text-align: center;
        }

        .result img {
            max-width: 100%;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.5s;
        }

        .result-questions {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
        }

        .result-questions h3 {
            margin-bottom: 15px;
            color: #ffaa00;
        }

        .question-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
        }

        .question-btn:hover {
            background: rgba(0, 212, 255, 0.1);
            border-color: #00d4ff;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .pipeline {
                flex-wrap: wrap;
            }
            .step {
                width: 33%;
                margin-bottom: 15px;
            }
            .pipeline::before, .pipeline-progress {
                display: none;
            }
            .header h1 {
                font-size: 36px;
            }
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>众星云集</h1>
            <p>让每一个人都可以把心里的想法变成实实在在的图片</p>
        </div>

        <div class="input-section">
            <div class="input-group">
                <input type="text" id="userInput" placeholder="描述你想要的画面，例如：给我家猫画个赛博朋克头像，要很酷" />
                <button class="btn" id="generateBtn" onclick="startGenerate()">生成</button>
            </div>

            <!-- 进度流程 -->
            <div class="pipeline" id="pipeline">
                <div class="pipeline-progress" id="pipelineProgress" style="width: 0%"></div>
            </div>

            <!-- 日志 -->
            <div class="logs" id="logs" style="display: none;"></div>

            <!-- 提示词展示 -->
            <div class="prompt-display" id="promptDisplay">
                <h4>📝 专业提示词</h4>
                <div id="promptContent"></div>
                <div class="prompt-meta" id="promptMeta"></div>
            </div>

            <!-- 结果 -->
            <div class="result" id="result"></div>
        </div>
    </div>

    <script>
        const steps = [
            { id: 'scheduler', name: '分析需求', icon: '🔀' },
            { id: 'experts', name: '专家分析', icon: '👁️' },
            { id: 'fusion', name: '融合意图', icon: '🔮' },
            { id: 'selector', name: '选择模型', icon: '🎯' },
            { id: 'prompt_engineer', name: '设计提示词', icon: '✍️' },
            { id: 'auditor', name: '安全审查', icon: '🔍' },
            { id: 'generator', name: '生成图像', icon: '🖼️' }
        ];

        function initPipeline() {
            const pipeline = document.getElementById('pipeline');
            const progressBar = pipeline.querySelector('.pipeline-progress');
            pipeline.innerHTML = '';
            pipeline.appendChild(progressBar);

            steps.forEach(step => {
                const div = document.createElement('div');
                div.className = 'step pending';
                div.id = `step-${step.id}`;
                div.innerHTML = `
                    <div class="step-icon">${step.icon}</div>
                    <div class="step-name">${step.name}</div>
                `;
                pipeline.appendChild(div);
            });
        }

        function updateStep(stepId, status, detail) {
            const step = document.getElementById(`step-${stepId}`);
            if (!step) return;
            step.className = `step ${status}`;
            if (detail) {
                step.querySelector('.step-name').textContent = detail;
            }
        }

        function updateProgress(current, total) {
            const percentage = (current / total) * 100;
            document.getElementById('pipelineProgress').style.width = `${percentage}%`;
        }

        function addLog(message, type = 'info') {
            const logs = document.getElementById('logs');
            logs.style.display = 'block';
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            const time = new Date().toLocaleTimeString();
            entry.innerHTML = `<span class="log-time">[${time}]</span><span class="log-${type}">${message}</span>`;
            logs.appendChild(entry);
            logs.scrollTop = logs.scrollHeight;
        }

        function showPrompt(prompt, meta) {
            const display = document.getElementById('promptDisplay');
            document.getElementById('promptContent').textContent = prompt;

            const metaDiv = document.getElementById('promptMeta');
            metaDiv.innerHTML = '';

            if (meta) {
                const metaMap = {
                    'photo': '摄影参数',
                    'lighting': '光影设置',
                    'composition': '构图法则',
                    'color': '色彩科学'
                };

                Object.entries(metaMap).forEach(([key, label]) => {
                    if (meta[key]) {
                        const item = document.createElement('div');
                        item.className = 'meta-item';
                        const values = Object.entries(meta[key])
                            .filter(([_, v]) => v)
                            .map(([k, v]) => `${k}: ${v}`)
                            .join(', ');
                        item.innerHTML = `<label>${label}</label><br><value>${values || '默认'}</value>`;
                        metaDiv.appendChild(item);
                    }
                });
            }

            display.style.display = 'block';
        }

        async function startGenerate() {
            const input = document.getElementById('userInput').value.trim();
            if (!input) {
                alert('请输入描述');
                return;
            }

            const btn = document.getElementById('generateBtn');
            btn.disabled = true;
            btn.textContent = '生成中...';

            initPipeline();
            document.getElementById('logs').innerHTML = '';
            document.getElementById('logs').style.display = 'none';
            document.getElementById('promptDisplay').style.display = 'none';
            document.getElementById('result').innerHTML = '';

            const sessionId = 'web_' + Date.now();

            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_input: input, session_id: sessionId })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                handleEvent(data);
                            } catch (e) {
                                console.error('Parse error:', e);
                            }
                        }
                    }
                }
            } catch (error) {
                addLog(`连接失败: ${error.message}`, 'error');
                updateStep('generator', 'error', '连接失败');
            } finally {
                btn.disabled = false;
                btn.textContent = '生成';
            }
        }

        function handleEvent(data) {
            switch (data.type) {
                case 'step':
                    handleStepEvent(data);
                    break;
                case 'progress':
                    handleProgressEvent(data);
                    break;
                case 'result':
                    handleResultEvent(data);
                    break;
            }
        }

        function handleStepEvent(data) {
            const { step_id, status, detail, data: extra } = data;
            const stepName = steps.find(s => s.id === step_id)?.name || step_id;

            if (status === 'running') {
                updateStep(step_id, 'running', detail);
                addLog(`[${stepName}] ${detail}`, 'info');
            } else if (status === 'completed') {
                updateStep(step_id, 'completed', detail);
                addLog(`[${stepName}] ✓ ${detail}`, 'success');
            } else if (status === 'error') {
                updateStep(step_id, 'error', detail);
                addLog(`[${stepName}] ✗ ${detail}`, 'error');
            }
        }

        function handleProgressEvent(data) {
            const { current, total, message, percentage } = data;
            updateProgress(current, total);
            addLog(`进度: ${percentage}% - ${message}`, 'info');
        }

        // 在前端 handleResultEvent 中修改 questions 处理

function handleResultEvent(data) {
    const { image_url, error, questions, prompt, meta } = data;
    const resultDiv = document.getElementById('result');

    if (error) {
        resultDiv.innerHTML = `<div style="color: #ff4444; padding: 20px;">生成失败: ${error}</div>`;
        addLog(`失败: ${error}`, 'error');
    } else if (image_url) {
        if (prompt) showPrompt(prompt, meta);
        resultDiv.innerHTML = `
            <img src="${image_url}" alt="生成的图像" onload="addLog('图像加载完成', 'success')" />
            <div style="margin-top: 15px; color: #888;">
                <a href="${image_url}" target="_blank" style="color: #00d4ff;">查看原图</a>
            </div>
        `;
        addLog('图像生成成功！', 'success');
    } else if (questions && questions.length > 0) {
        // 显示追问输入框（不是选择题）
        const clarifyDiv = document.createElement('div');
        clarifyDiv.className = 'result-questions';
        clarifyDiv.id = 'clarify-section';

        const promptText = questions[0]; // 追问提示

        clarifyDiv.innerHTML = `
            <h3>🤔 ${promptText}</h3>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <input type="text"
                       id="clarifyInput"
                       placeholder="请补充描述..."
                       style="flex: 1; padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: #fff; font-size: 14px;" />
                <button onclick="submitClarification()"
                        style="padding: 12px 24px; border: none; border-radius: 8px; background: linear-gradient(90deg, #00d4ff, #7b2cbf); color: #fff; cursor: pointer;">
                    补充
                </button>
            </div>
            <p style="margin-top: 10px; color: #666; font-size: 12px;">
                也可以直接输入完整描述，我会结合之前的对话理解
            </p>
        `;

        resultDiv.appendChild(clarifyDiv);
        addLog('需要补充信息: ' + promptText, 'warn');

        // 自动聚焦输入框
        setTimeout(() => document.getElementById('clarifyInput')?.focus(), 100);
    }
}

// 提交补充信息
    function submitClarification() {
        const input = document.getElementById('clarifyInput').value.trim();
        if (!input) return;

        // 移除追问区域
        const clarifySection = document.getElementById('clarify-section');
        if (clarifySection) clarifySection.remove();

        // 将补充内容追加到主输入框
        const mainInput = document.getElementById('userInput');
        const current = mainInput.value.trim();
        mainInput.value = current ? current + '，' + input : input;

        // 继续生成流程
        startGenerate();
    }

        initPipeline();

        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') startGenerate();
        });
    </script>
</body>
</html>
